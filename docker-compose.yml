services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./outputs:/app/outputs
      - ./temp_uploads:/app/temp_uploads
      - ./intros:/app/intros
      - ./voix.json:/app/voix.json:ro
    environment:
      - OLLAMA_API_URL=http://host.docker.internal:11434/api/generate
      - TTS_API_URL=http://host.docker.internal:8001
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  tts:
    build:
      context: .
      dockerfile: Dockerfile.tts
    ports:
      - "127.0.0.1:8001:8001"
    volumes:
      - ./outputs:/app/outputs
      - ./voix.json:/app/voix.json:ro
    restart: unless-stopped
